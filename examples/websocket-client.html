<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeLang WebSocket Chat Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .status {
            font-size: 12px;
            opacity: 0.9;
        }

        .status.connected::before {
            content: "● ";
            color: #4ade80;
        }

        .status.disconnected::before {
            content: "● ";
            color: #ef4444;
        }

        .join-panel {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .join-panel.hidden {
            display: none;
        }

        .join-panel input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .join-panel button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .join-panel button:hover {
            background: #5568d3;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            text-align: center;
            color: #6b7280;
            font-size: 12px;
            margin: 16px 0;
        }

        .message.own {
            display: flex;
            justify-content: flex-end;
        }

        .message.own .bubble {
            background: #667eea;
            color: white;
        }

        .message.other .bubble {
            background: #e5e7eb;
            color: #1f2937;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message-info {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
            padding: 0 10px;
        }

        .typing {
            font-style: italic;
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .input-panel {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .input-panel.hidden {
            display: none;
        }

        .input-panel input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-panel button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .input-panel button:hover {
            background: #5568d3;
        }

        .controls {
            padding: 10px 20px;
            background: #f3f4f6;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
        }

        .controls button {
            padding: 6px 12px;
            background: #d1d5db;
            color: #1f2937;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #9ca3af;
        }

        .user-count {
            padding: 10px 20px;
            background: #ecfdf5;
            color: #065f46;
            font-size: 12px;
            border-bottom: 1px solid #d1fae5;
        }

        .error {
            padding: 10px 20px;
            background: #fef2f2;
            color: #991b1b;
            font-size: 12px;
            border-bottom: 1px solid #fee2e2;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FreeLang Chat</h1>
            <div class="status disconnected" id="status">Disconnected</div>
        </div>

        <div class="join-panel" id="joinPanel">
            <input type="text" id="username" placeholder="Enter your username..." maxlength="20">
            <button onclick="joinChat()">Join</button>
        </div>

        <div class="user-count hidden" id="userCount"></div>
        <div class="error hidden" id="errorBox"></div>

        <div class="messages" id="messages"></div>

        <div class="controls hidden" id="controls">
            <button onclick="showUserList()">📋 Users</button>
            <button onclick="showStats()">📊 Stats</button>
            <button onclick="leaveChat()">🚪 Leave</button>
        </div>

        <div class="input-panel hidden" id="inputPanel">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const WS_URL = 'ws://localhost:8080';
        let ws = null;
        let username = null;
        let isConnected = false;
        let typingTimeout = null;

        // Initialize
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinChat();
        });

        function updateStatus(connected) {
            isConnected = connected;
            const statusEl = document.getElementById('status');
            const joinPanel = document.getElementById('joinPanel');
            const inputPanel = document.getElementById('inputPanel');
            const controls = document.getElementById('controls');

            if (connected) {
                statusEl.textContent = '● Connected';
                statusEl.className = 'status connected';
                joinPanel.classList.add('hidden');
                inputPanel.classList.remove('hidden');
                controls.classList.remove('hidden');
            } else {
                statusEl.textContent = '● Disconnected';
                statusEl.className = 'status disconnected';
                joinPanel.classList.remove('hidden');
                inputPanel.classList.add('hidden');
                controls.classList.add('hidden');
                username = null;
            }
        }

        function joinChat() {
            const usernameInput = document.getElementById('username');
            const name = usernameInput.value.trim();

            if (!name) {
                showError('Please enter a username');
                return;
            }

            username = name;
            connectWebSocket();
            usernameInput.value = '';
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    console.log('Connected to WebSocket server');
                    updateStatus(true);
                    sendJoinMessage();
                    addSystemMessage(username + ' joined the chat');
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        handleMessage(msg);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showError('Connection error');
                };

                ws.onclose = () => {
                    console.log('Disconnected from server');
                    updateStatus(false);
                    addSystemMessage('Disconnected from server');
                };
            } catch (e) {
                showError('Failed to connect: ' + e.message);
                console.error('Connection error:', e);
            }
        }

        function sendJoinMessage() {
            ws.send(JSON.stringify({
                type: 'join',
                username: username
            }));
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            ws.send(JSON.stringify({
                type: 'message',
                username: username,
                text: text
            }));

            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            } else {
                // Notify typing
                clearTimeout(typingTimeout);
                ws.send(JSON.stringify({
                    type: 'typing',
                    username: username
                }));
            }
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'welcome':
                    addSystemMessage(msg.message);
                    break;

                case 'user_joined':
                    addSystemMessage(msg.message);
                    updateUserCount(msg.userCount);
                    break;

                case 'message':
                    const isOwn = msg.from === username;
                    addMessage(msg.from, msg.text, isOwn, msg.timestamp);
                    break;

                case 'user_left':
                    addSystemMessage(msg.message);
                    updateUserCount(msg.userCount);
                    break;

                case 'user_typing':
                    if (msg.username !== username) {
                        showTyping(msg.username);
                    }
                    break;

                case 'user_list':
                    showUserListMessage(msg.users);
                    break;

                case 'stats':
                    showStatsMessage(msg.totalUsers, msg.messageCount);
                    break;

                case 'error':
                    showError(msg.message);
                    break;

                default:
                    console.log('Unknown message type:', msg.type);
            }
        }

        function addMessage(from, text, isOwn, timestamp) {
            const messagesEl = document.getElementById('messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message ' + (isOwn ? 'own' : 'other');

            const time = new Date(timestamp * 1000).toLocaleTimeString();

            msgEl.innerHTML = `
                <div class="bubble">${escapeHtml(text)}</div>
                <div class="message-info">${from} ${time}</div>
            `;

            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesEl = document.getElementById('messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message system';
            msgEl.textContent = text;
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping(name) {
            const messagesEl = document.getElementById('messages');
            const existing = messagesEl.querySelector('.typing');
            if (existing) existing.remove();

            const typEl = document.createElement('div');
            typEl.className = 'typing';
            typEl.textContent = name + ' is typing...';
            messagesEl.appendChild(typEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (typEl.parentNode) typEl.remove();
            }, 3000);
        }

        function updateUserCount(count) {
            const userCountEl = document.getElementById('userCount');
            userCountEl.textContent = 'Users online: ' + count;
            userCountEl.classList.remove('hidden');
        }

        function showUserList() {
            ws.send(JSON.stringify({ type: 'list' }));
        }

        function showUserListMessage(users) {
            addSystemMessage('Users: ' + (users.length > 0 ? users.join(', ') : 'None'));
        }

        function showStats() {
            ws.send(JSON.stringify({ type: 'stats' }));
        }

        function showStatsMessage(users, messages) {
            addSystemMessage('📊 Users: ' + users + ' | Messages: ' + messages);
        }

        function leaveChat() {
            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    type: 'leave',
                    username: username
                }));
                ws.close();
            }
            updateStatus(false);
            document.getElementById('messages').innerHTML = '';
            document.getElementById('userCount').classList.add('hidden');
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '⚠️ ' + message;
            errorBox.classList.remove('hidden');

            setTimeout(() => {
                errorBox.classList.add('hidden');
            }, 5000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
