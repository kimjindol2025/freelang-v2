<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeLang Production System - Phase 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      color: #666;
      font-size: 1.1em;
      margin-bottom: 30px;
    }

    .status {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin: 20px 0;
      border-radius: 5px;
    }

    .status-title {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .status-line {
      color: #555;
      margin: 5px 0;
      font-family: 'Courier New', monospace;
    }

    .section {
      margin: 30px 0;
    }

    .section-title {
      font-size: 1.3em;
      color: #333;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .endpoint {
      background: #f9f9f9;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: all 0.3s;
    }

    .endpoint:hover {
      background: #667eea;
      color: white;
    }

    .endpoint-method {
      font-weight: bold;
      color: #667eea;
    }

    .endpoint:hover .endpoint-method {
      color: white;
    }

    .test-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #eee;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      font-size: 1em;
      transition: all 0.3s;
    }

    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .response {
      background: #f5f5f5;
      padding: 15px;
      margin-top: 10px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }

    .response.show {
      display: block;
    }

    .response.success {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
    }

    .response.error {
      background: #ffebee;
      border-left: 4px solid #f44336;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #999;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 FreeLang Production System</h1>
    <p class="subtitle">Phase 1: HTTP Server (Real TCP Sockets)</p>

    <div class="status">
      <div class="status-title">✅ 서버 상태</div>
      <div class="status-line">상태: 운영 중</div>
      <div class="status-line" id="uptime">가동 시간: 계산 중...</div>
      <div class="status-line" id="requests">요청: 계산 중...</div>
      <div class="status-line" id="connections">활성 연결: 계산 중...</div>
    </div>

    <div class="section">
      <div class="section-title">📚 사용 가능한 엔드포인트</div>
      <div class="endpoint">
        <span class="endpoint-method">GET</span> /
      </div>
      <div class="endpoint">
        <span class="endpoint-method">GET</span> /status
      </div>
      <div class="endpoint">
        <span class="endpoint-method">GET</span> /api/hello
      </div>
      <div class="endpoint">
        <span class="endpoint-method">POST</span> /api/echo
      </div>
    </div>

    <div class="section test-section">
      <div class="section-title">🧪 API 테스트</div>

      <button onclick="testHello()">테스트: /api/hello</button>
      <div id="hello-response" class="response"></div>

      <button onclick="testEcho()">테스트: /api/echo</button>
      <div id="echo-response" class="response"></div>

      <button onclick="testStatus()">테스트: /status</button>
      <div id="status-response" class="response"></div>
    </div>

    <div class="footer">
      <p>FreeLang v1.0 - Production Ready</p>
      <p>Real TCP Socket Implementation | Zero Dependencies</p>
    </div>
  </div>

  <script>
    // 서버 상태 업데이트
    function updateStatus() {
      fetch('/status')
        .then(r => r.json())
        .then(data => {
          document.getElementById('uptime').textContent = `가동 시간: ${data.uptime}초`;
          document.getElementById('requests').textContent = `요청: ${data.totalRequests}`;
          document.getElementById('connections').textContent = `활성 연결: ${data.activeConnections}`;
        })
        .catch(e => console.error('Status update error:', e));
    }

    function testHello() {
      fetch('/api/hello')
        .then(r => r.json())
        .then(data => {
          showResponse('hello-response', data, 'success');
        })
        .catch(e => showResponse('hello-response', { error: e.message }, 'error'));
    }

    function testEcho() {
      fetch('/api/echo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Hello Phase 1!', timestamp: new Date().toISOString() })
      })
        .then(r => r.json())
        .then(data => {
          showResponse('echo-response', data, 'success');
        })
        .catch(e => showResponse('echo-response', { error: e.message }, 'error'));
    }

    function testStatus() {
      fetch('/status')
        .then(r => r.json())
        .then(data => {
          showResponse('status-response', data, 'success');
        })
        .catch(e => showResponse('status-response', { error: e.message }, 'error'));
    }

    function showResponse(elementId, data, className) {
      const elem = document.getElementById(elementId);
      elem.textContent = JSON.stringify(data, null, 2);
      elem.className = `response show ${className}`;
    }

    // 초기 업데이트
    updateStatus();
    setInterval(updateStatus, 2000);
  </script>
</body>
</html>
